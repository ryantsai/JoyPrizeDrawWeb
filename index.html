<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Joy Prize Draw</title>
    <meta
      name="description"
      content="Spin the wheel, reveal winners, and run unforgettable prize draws with Joy Prize Draw."
    />
    <meta
      property="og:title"
      content="Joy Prize Draw | Prize reveals with real stage presence"
    />
    <meta
      property="og:description"
      content="A polished prize draw app for classrooms, parties, streams, and live events."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/img/store_banner.png" />
    <meta name="theme-color" content="#0d1230" />
    <link rel="icon" type="image/png" href="assets/img/app_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Sans+KR:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      :root {
        --promo-cream: #fff5e9;
        --promo-ink: #2f1d13;
        --promo-soft: #6b4634;
        --promo-orange: #e85d1f;
        --promo-amber: #f59e3c;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(245, 158, 60, 0.18), transparent 26%),
          radial-gradient(circle at 82% 12%, rgba(255, 209, 102, 0.18), transparent 22%),
          linear-gradient(180deg, #111217 0%, #151325 35%, #091123 100%);
      }

      .site-nav {
        gap: 18px;
      }

      .landing-hero {
        position: relative;
        min-height: 100svh;
        padding-top: calc(var(--header-height) + 42px);
        padding-bottom: 58px;
      }

      .landing-hero::before,
      .landing-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .landing-hero::before {
        opacity: 0.18;
        background-image:
          radial-gradient(circle at 18% 14%, rgba(255, 255, 255, 0.22) 0 1px, transparent 1px),
          radial-gradient(circle at 72% 24%, rgba(255, 255, 255, 0.16) 0 1px, transparent 1px),
          radial-gradient(circle at 42% 82%, rgba(255, 255, 255, 0.12) 0 1px, transparent 1px);
        background-size: 190px 190px, 220px 220px, 200px 200px;
      }

      .landing-hero::after {
        inset: 0 0 14%;
        background:
          linear-gradient(90deg, rgba(17, 18, 23, 0.95) 0%, rgba(17, 18, 23, 0.78) 44%, rgba(17, 18, 23, 0.32) 72%, rgba(17, 18, 23, 0.08) 100%),
          url("assets/img/store_banner.png") center / cover no-repeat;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 1) 80%, transparent 100%);
      }

      .hero-layout {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.98fr);
        gap: clamp(28px, 5vw, 72px);
        align-items: center;
        min-height: calc(100svh - var(--header-height) - 42px);
      }

      .hero-copy {
        max-width: 42rem;
      }

      .hero-copy .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 245, 233, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #ffe4c0;
      }

      .hero-copy h1 {
        margin: 18px 0 0;
        font-family: "Fraunces", serif;
        font-size: clamp(3.2rem, 7vw, 6.8rem);
        line-height: 0.96;
        letter-spacing: -0.05em;
        text-wrap: balance;
      }

      .hero-copy h1 .accent {
        color: #ffd7ad;
      }

      .hero-lead {
        max-width: 38rem;
        margin: 22px 0 0;
        color: rgba(248, 246, 239, 0.78);
      }

      .hero-actions {
        margin-top: 30px;
      }

      .hero-visual {
        position: relative;
        min-height: 660px;
      }

      .hero-stage {
        position: absolute;
        inset: 10% 3% 4% 10%;
        border-radius: 34px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
          rgba(14, 18, 34, 0.82);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
      }

      .hero-stage img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
      }

      .hero-badge {
        position: absolute;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-radius: 22px;
        background: rgba(255, 245, 233, 0.96);
        color: var(--promo-ink);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.24);
      }

      .hero-badge::before {
        content: "";
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--promo-orange), var(--promo-amber));
        box-shadow: 0 0 0 8px rgba(232, 93, 31, 0.12);
      }

      .badge-top {
        top: 14%;
        right: -2%;
        transform: rotate(4deg);
      }

      .badge-bottom {
        left: 0;
        bottom: 15%;
        transform: rotate(-5deg);
      }

      .hero-note {
        margin-top: 20px;
      }

      .promo-section {
        position: relative;
        padding: 108px 0;
      }

      .promo-head {
        max-width: 50rem;
        margin-bottom: 34px;
      }

      .promo-head h2 {
        margin: 14px 0 0;
        font-family: "Fraunces", serif;
        font-size: clamp(2.5rem, 5vw, 4.6rem);
        line-height: 0.98;
        letter-spacing: -0.04em;
        text-wrap: balance;
      }

      .promo-head p {
        margin: 18px 0 0;
        color: var(--muted);
        line-height: 1.75;
      }

      .story-grid {
        display: grid;
        gap: 24px;
      }

      .story-card {
        display: grid;
        grid-template-columns: minmax(0, 1.06fr) minmax(320px, 0.94fr);
        gap: clamp(20px, 4vw, 42px);
        align-items: center;
        padding: clamp(22px, 3vw, 34px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 34px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
          rgba(14, 18, 34, 0.82);
        box-shadow: var(--shadow);
      }

      .story-card.reverse .story-copy {
        order: 1;
      }

      .story-card.reverse .story-shot {
        order: 2;
      }

      .story-shot {
        position: relative;
      }

      .story-shot::before {
        content: "";
        position: absolute;
        inset: -14px;
        border-radius: 30px;
        background: radial-gradient(circle at top left, rgba(245, 158, 60, 0.22), transparent 54%);
        z-index: 0;
      }

      .story-shot img {
        position: relative;
        z-index: 1;
        width: 100%;
        border-radius: 26px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 22px 48px rgba(0, 0, 0, 0.28);
      }

      .story-copy .eyebrow {
        margin-bottom: 12px;
      }

      .story-copy h3,
      .organizer-copy h3 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .story-copy p,
      .organizer-copy p {
        margin: 16px 0 0;
        color: var(--muted);
        line-height: 1.72;
      }

      .story-points {
        display: grid;
        gap: 12px;
        margin: 24px 0 0;
      }

      .story-points div {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .mode-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .mode-card {
        min-height: 340px;
        border-radius: 28px;
      }

      .mode-card img {
        aspect-ratio: 4 / 3;
      }

      .section-workflow {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
          radial-gradient(circle at 18% 0%, rgba(245, 158, 60, 0.12), transparent 28%);
      }

      .workflow-grid {
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
        gap: clamp(28px, 5vw, 64px);
        align-items: center;
      }

      .workflow-copy h2,
      .organizer-copy h2,
      .section-head h2 {
        font-family: "Fraunces", serif;
      }

      .workflow-media {
        min-height: auto;
      }

      .workflow-stage {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .workflow-stage img {
        width: 100%;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
      }

      .workflow-thumbnail,
      .workflow-media::before,
      .organizer-main,
      .organizer-strip {
        display: none;
      }

      .section-organizers {
        display: grid;
        grid-template-columns: minmax(0, 1.02fr) minmax(0, 0.98fr);
        gap: clamp(28px, 5vw, 56px);
        align-items: center;
      }

      .organizer-media {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .organizer-media img {
        width: 100%;
        border-radius: 26px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.26);
      }

      .organizer-feature-strip {
        display: grid;
        gap: 18px;
      }

      .feature-list {
        margin-top: 26px;
      }

      .feature-item {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      @media (max-width: 1120px) {
        .hero-layout,
        .story-card,
        .workflow-grid,
        .section-organizers {
          grid-template-columns: 1fr;
        }

        .story-card.reverse .story-copy,
        .story-card.reverse .story-shot {
          order: initial;
        }

        .mode-grid,
        .audience-grid,
        .faq-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 860px) {
        .landing-hero {
          padding-top: 26px;
        }

        .hero-layout {
          min-height: auto;
        }

        .hero-visual {
          min-height: 460px;
        }

        .mode-grid,
        .workflow-stage,
        .organizer-media,
        .audience-grid,
        .faq-list {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 620px) {
        .hero-stage {
          inset: 14% 0 6%;
        }

        .badge-top {
          right: 0;
        }

        .badge-bottom {
          left: 0;
          bottom: 6%;
        }

        .promo-section,
        .section {
          padding: 84px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#top" aria-label="Joy Prize Draw home">
          <img src="assets/img/logo.png" alt="" />
          <span>Joy Prize Draw</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="#top">Home</a>
          <a href="redirect.html">Download</a>
          <a href="#support">Support</a>
        </nav>
        <div class="language-control">
          <label id="language-label" for="locale-select">Language</label>
          <select id="locale-select" aria-labelledby="language-label"></select>
        </div>
      </header>

      <main>
        <section class="landing-hero" id="top">
          <div class="container hero-layout">
            <div class="hero-copy reveal reveal-visible">
              <p class="eyebrow" id="hero-eyebrow"></p>
              <h1 id="hero-title"></h1>
              <p class="hero-lead" id="hero-lead"></p>
              <div class="hero-actions">
                <a class="button button-primary" id="hero-primary-cta" href="#modes"></a>
                <a class="button button-secondary" id="hero-secondary-cta" href="#workflow"></a>
                <a class="button button-secondary" href="redirect.html">Download App</a>
              </div>
              <ul class="hero-stats" id="hero-stats"></ul>
              <p class="hero-note" id="hero-note"></p>
            </div>

            <div class="hero-visual reveal reveal-visible" aria-hidden="true">
              <div class="hero-stage">
                <img src="assets/img/mac-wheel.png" alt="" />
              </div>
              <div class="hero-badge badge-top" id="visual-chip-top"></div>
              <div class="hero-badge badge-bottom" id="visual-chip-bottom"></div>
            </div>
          </div>
        </section>

        <section class="promo-section container reveal" id="story">
          <div class="promo-head">
            <p class="eyebrow" id="modes-eyebrow"></p>
            <h2 id="modes-title"></h2>
            <p id="modes-intro"></p>
          </div>

          <div class="story-grid">
            <article class="story-card">
              <div class="story-shot">
                <img src="assets/img/mac-modes.png" alt="" />
              </div>
              <div class="story-copy">
                <p class="eyebrow" id="story-visual-eyebrow"></p>
                <h3 id="story-visual-title"></h3>
                <p id="story-visual-body"></p>
                <div class="story-points">
                  <div id="story-visual-point-1"></div>
                  <div id="story-visual-point-2"></div>
                </div>
              </div>
            </article>

            <article class="story-card reverse">
              <div class="story-shot">
                <img src="assets/img/mac-prizes.png" alt="" />
              </div>
              <div class="story-copy">
                <p class="eyebrow" id="story-setup-eyebrow"></p>
                <h3 id="story-setup-title"></h3>
                <p id="story-setup-body"></p>
                <div class="story-points">
                  <div id="story-setup-point-1"></div>
                  <div id="story-setup-point-2"></div>
                </div>
              </div>
            </article>
          </div>
        </section>

        <section class="section section-modes container reveal" id="modes">
          <div class="mode-grid" id="mode-grid"></div>
        </section>

        <section class="section section-workflow reveal" id="workflow">
          <div class="container workflow-grid">
            <div class="workflow-copy">
              <p class="eyebrow" id="workflow-eyebrow"></p>
              <h2 id="workflow-title"></h2>
              <p class="section-lead" id="workflow-intro"></p>
              <ol class="story-steps" id="workflow-steps"></ol>
            </div>
            <div class="workflow-media" aria-hidden="true">
              <div class="workflow-stage">
                <img src="assets/img/mac-gacha.png" alt="" />
                <img src="assets/img/mac-winner.png" alt="" />
                <img src="assets/img/mac-history.png" alt="" />
                <img src="assets/img/mac-publish.png" alt="" />
              </div>
            </div>
          </div>
        </section>

        <section class="section section-organizers container reveal" id="organizers">
          <div class="organizer-media" aria-hidden="true">
            <img src="assets/img/mac-winner.png" alt="" />
            <img src="assets/img/mac-publish.png" alt="" />
            <img src="assets/img/mac-history.png" alt="" />
            <img src="assets/img/mac-gacha.png" alt="" />
          </div>
          <div class="organizer-copy">
            <p class="eyebrow" id="organizers-eyebrow"></p>
            <h2 id="organizers-title"></h2>
            <p class="section-lead" id="organizers-intro"></p>
            <div class="feature-list" id="feature-list"></div>
          </div>
        </section>

        <section class="section section-audiences container reveal" id="audiences">
          <div class="section-head compact">
            <p class="eyebrow" id="audiences-eyebrow"></p>
            <h2 id="audiences-title"></h2>
            <p id="audiences-intro"></p>
          </div>
          <div class="audience-grid" id="audience-grid"></div>
        </section>

        <section class="section section-faq container reveal" id="faq">
          <div class="section-head compact">
            <p class="eyebrow" id="faq-eyebrow"></p>
            <h2 id="faq-title"></h2>
          </div>
          <div class="faq-list" id="faq-list"></div>
        </section>
      </main>

      <footer class="site-footer container" id="support">
        <div>
          <p class="footer-brand">Joy Prize Draw</p>
          <p id="footer-tagline"></p>
          <div class="footer-links" aria-label="Support links">
            <a href="mailto:publish@ryantsai.com">Support</a>
            <a href="https://ryantsai.github.io/JoyPrizeDrawWeb/privacy.html" target="_blank" rel="noreferrer">Privacy Policy</a>
            <a href="https://ryantsai.github.io/JoyPrizeDrawWeb/data-deletion.html" target="_blank" rel="noreferrer">Data Deletion</a>
          </div>
        </div>
      </footer>
    </div>

    <script src="locales/en.js"></script>
    <script src="locales/ja.js"></script>
    <script src="locales/zh.js"></script>
    <script src="locales/zh-cn.js"></script>
    <script src="locales/zh-tw.js"></script>
    <script src="locales/ko.js"></script>
    <script src="locales/fr.js"></script>
    <script src="locales/de.js"></script>
    <script src="locales/es.js"></script>
    <script src="locales/it.js"></script>
    <script src="script.js"></script>
  </body>
</html>
